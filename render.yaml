services:
  - type: web
    name: land-surveillance-django-v4
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: "land-surveillance-django-v4.onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://land-surveillance-django-v4.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: land-surveillance-db
          property: connectionString
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"
      - key: SMS_BACKEND
        value: "console"
      - key: DETECTION_BACKEND
        value: "prototype"

databases:
  - name: land-surveillance-db
    plan: free